<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE TRUTH IS OUT THERE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #c0c0c0;
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .content > * {
            pointer-events: auto;
        }
        
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #e0e0e0;
            text-shadow: 
                0 0 10px rgba(180, 180, 255, 0.8),
                0 0 30px rgba(180, 180, 255, 0.5),
                0 0 60px rgba(180, 180, 255, 0.3);
            animation: flicker 4s infinite;
            text-align: center;
            padding: 0 20px;
        }
        
        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            letter-spacing: 0.5em;
            color: #808090;
            margin-top: 20px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        
        .enter-btn {
            margin-top: 60px;
            padding: 20px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            background: transparent;
            border: 2px solid #a0a0b0;
            color: #d0d0e0;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(180, 180, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        .enter-btn:hover {
            border-color: #b0b0ff;
            color: #fff;
            box-shadow: 
                0 0 20px rgba(180, 180, 255, 0.5),
                inset 0 0 20px rgba(180, 180, 255, 0.1);
        }
        
        .enter-btn:hover::before {
            left: 100%;
        }
        
        .glyph-row {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            left: 0;
        }
        
        .glyph {
            font-size: 1.5rem;
            color: #606070;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.6;
        }
        
        .glyph:hover {
            color: #b0b0ff;
            text-shadow: 0 0 15px rgba(180, 180, 255, 0.8);
            transform: scale(1.3) rotate(10deg);
            opacity: 1;
        }
        
        .scrolling-message {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%) rotate(90deg);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: #404050;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            96% { opacity: 0.9; }
            97% { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="content">
        <h1 class="title">The Truth</h1>
        <p class="subtitle">Is out there</p>
        <button class="enter-btn" onclick="scrollToSection('truth')">Begin Inquiry</button>
    </div>
    
    <div class="glyph-row">
        <span class="glyph" data-char="⍙">⍙</span>
        <span class="glyph" data-char="⍚">⍚</span>
        <span class="glyph" data-char="⍓">⍓</span>
        <span class="glyph" data-char="⍝">⍝</span>
        <span class="glyph" data-char="⍜">⍜</span>
    </div>
    
    <div class="scrolling-message">◀ DECLASSIFIED ▶</div>
    <div class="scanline"></div>
    
    <section id="truth" style="min-height: 150vh; padding: 100px 20px; display: flex; flex-direction: column; align-items: center;">
        <h2 style="font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 50px; color: #d0d0e0;">THE COINS</h2>
        <p style="color: #606070; text-align: center; max-width: 600px; margin-bottom: 60px;">Scroll to reveal the ancient currency of visitors from beyond.</p>
        
        <div class="coin-gallery" style="display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;">
            <div class="alien-coin" style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #2a2a3a, #1a1a2a); border: 3px solid #4a4a6a; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 30px rgba(100,100,255,0.2);">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="35" fill="none" stroke="#6a6a8a" stroke-width="2"/>
                    <circle cx="40" cy="40" r="25" fill="none" stroke="#5a5a7a" stroke-width="1"/>
                    <text x="40" y="45" text-anchor="middle" fill="#a0a0c0" font-size="24">⍙</text>
                </svg>
            </div>
            <div class="alien-coin" style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #2a2a3a, #1a1a2a); border: 3px solid #4a4a6a; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 30px rgba(100,100,255,0.2);">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="35" fill="none" stroke="#6a6a8a" stroke-width="2"/>
                    <polygon points="40,15 50,50 30,50" fill="none" stroke="#8a8aaa" stroke-width="2"/>
                    <circle cx="40" cy="40" r="10" fill="none" stroke="#5a5a7a" stroke-width="1"/>
                </svg>
            </div>
            <div class="alien-coin" style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #2a2a3a, #1a1a2a); border: 3px solid #4a4a6a; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 30px rgba(100,100,255,0.2);">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="35" fill="none" stroke="#6a6a8a" stroke-width="2"/>
                    <circle cx="25" cy="35" r="8" fill="#4a4a6a"/>
                    <circle cx="55" cy="35" r="8" fill="#4a4a6a"/>
                    <ellipse cx="40" cy="55" rx="15" ry="10" fill="none" stroke="#6a6a8a" stroke-width="2"/>
                </svg>
            </div>
        </div>
        
        <p style="color: #505060; margin-top: 60px; font-size: 0.8rem; letter-spacing: 0.2em;">◀ SELECT TO EXAMINE ▶</p>
        
        <div id="coin-info" style="margin-top: 40px; padding: 30px; border: 1px solid #303040; max-width: 500px; text-align: center; opacity: 0; transition: opacity 0.5s;">
            <h3 id="coin-title" style="color: #a0a0c0; margin-bottom: 15px; font-family: 'Orbitron';">SELECT A COIN</h3>
            <p id="coin-desc" style="color: #606070; line-height: 1.6;">Ancient currency recovered from crash sites. Each coin contains a quantum-encrypted memory of the donor's civilization.</p>
        </div>
        
        <button style="margin-top: 40px; padding: 15px 40px; background: transparent; border: 1px solid #4a4a6a; color: #808090; font-family: 'Share Tech Mono'; cursor: pointer; transition: all 0.3s;" onclick="alert('QUANTUM DECRYPTION IN PROGRESS...')">DECRYPT COIN DATA</button>
    </section>
    
    <style>
        .alien-coin:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 50px rgba(150,150,255,0.5) !important;
            border-color: #6a6a9a !important;
        }
    </style>
    
    <script>
        // Coin interaction
        const coinData = [
            { title: '⍙ - THE WITNESS', desc: 'First contact coin. Issued by the Council of Orion. Contains a holographic map of Earth marking "observation zones."' },
            { title: '▲ - THE TRAVELER', desc: 'Interstellar toll coin. Valid across 47 star systems. Value: approximately 0.003 Earth years of labor.' },
            { title: '◯◉◯ - THE OBSERVER', desc: 'Diplomatic currency. Three circles represent the tri-species alliance. Rare - only 10,000 minted.' }
        ];
        
        document.querySelectorAll('.alien-coin').forEach((coin, i) => {
            coin.addEventListener('click', () => {
                const info = document.getElementById('coin-info');
                document.getElementById('coin-title').textContent = coinData[i].title;
                document.getElementById('coin-desc').textContent = coinData[i].desc;
                info.style.opacity = '1';
            });
        });
    </script>

    <script>
        // p5.js sketch for starfield and UFO
        let stars = [];
        let ufoY = -100;
        let beamOpacity = 0;
        let targetUfoY;
        
        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');
            
            // Create stars
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: random(width),
                    y: random(height),
                    size: random(0.5, 3),
                    speed: random(0.2, 1.5),
                    brightness: random(100, 255)
                });
            }
            
            targetUfoY = height * 0.35;
        }
        
        function draw() {
            // Dark space background
            background(5, 5, 15);
            
            // Draw nebula effect
            drawNebula();
            
            // Draw stars
            drawStars();
            
            // Draw UFO beam
            if (ufoY > -50) {
                drawBeam();
            }
            
            // Draw UFO
            drawUFO();
            
            // Animate UFO landing
            ufoY = lerp(ufoY, targetUfoY, 0.01);
            
            // Beam fades in as UFO approaches
            if (ufoY > targetUfoY * 0.5) {
                beamOpacity = lerp(beamOpacity, 200, 0.02);
            }
        }
        
        function drawNebula() {
            noStroke();
            for (let i = 0; i < 5; i++) {
                let x = width * (0.2 + i * 0.15);
                let y = height * (0.3 + sin(frameCount * 0.005 + i) * 0.1);
                let size = 200 + sin(frameCount * 0.003 + i * 2) * 50;
                
                let c = color(30 + i * 10, 20, 50, 15);
                fill(c);
                ellipse(x, y, size, size * 0.6);
            }
        }
        
        function drawStars() {
            noStroke();
            for (let star of stars) {
                let alpha = star.brightness + sin(frameCount * 0.05 + star.x) * 30;
                fill(200, 210, 255, alpha);
                ellipse(star.x, star.y, star.size);
                
                // Twinkle
                if (random() < 0.002) {
                    fill(255, 255, 255, 200);
                    ellipse(star.x, star.y, star.size * 3);
                }
                
                // Move stars slightly
                star.y += star.speed * 0.1;
                if (star.y > height) {
                    star.y = 0;
                    star.x = random(width);
                }
            }
        }
        
        function drawBeam() {
            push();
            let beamCenterX = width / 2;
            
            // Outer glow
            for (let i = 5; i > 0; i--) {
                let alpha = beamOpacity * 0.1 / i;
                let beamWidth = 150 + i * 30;
                fill(100, 150, 255, alpha);
                triangle(
                    beamCenterX, ufoY + 40,
                    beamCenterX - beamWidth, height,
                    beamCenterX + beamWidth, height
                );
            }
            
            // Core beam
            fill(150, 200, 255, beamOpacity * 0.3);
            triangle(
                beamCenterX, ufoY + 40,
                beamCenterX - 80, height,
                beamCenterX + 80, height
            );
            
            // Beam lines
            stroke(200, 230, 255, beamOpacity * 0.4);
            strokeWeight(1);
            for (let i = 0; i < 7; i++) {
                let xOffset = map(i, 0, 6, -60, 60);
                let y1 = ufoY + 50 + random(10);
                let y2 = height;
                line(beamCenterX + xOffset, y1, beamCenterX + xOffset * 2, y2);
            }
            pop();
        }
        
        function drawUFO() {
            push();
            translate(width / 2, ufoY);
            
            let hover = sin(frameCount * 0.08) * 5;
            
            // Dome glow
            noStroke();
            for (let i = 5; i > 0; i--) {
                fill(100, 150, 255, 10 / i);
                ellipse(0, hover - 10, 60 + i * 15, 40 + i * 10);
            }
            
            // Dome
            fill(150, 180, 220, 150);
            ellipse(0, hover - 10, 60, 40);
            
            // Dome highlight
            fill(255, 255, 255, 100);
            ellipse(-10, hover - 15, 20, 15);
            
            // Body
            fill(80, 85, 95);
            ellipse(0, hover, 120, 30);
            
            // Body ring
            fill(100, 105, 115);
            ellipse(0, hover, 130, 35);
            
            // Lights
            let lightCount = 7;
            for (let i = 0; i < lightCount; i++) {
                let angle = map(i, 0, lightCount - 1, -PI * 0.7, PI * 0.7);
                let lx = cos(angle) * 50;
                let ly = sin(angle) * 10;
                let blink = sin(frameCount * 0.2 + i) > 0;
                
                fill(blink ? color(200, 255, 200) : color(100, 150, 100));
                ellipse(lx, hover + ly + 5, 6, 4);
            }
            
            // Bottom lights
            fill(200, 100, 100, 150 + sin(frameCount * 0.1) * 50);
            ellipse(-30, hover + 15, 8, 5);
            ellipse(30, hover + 15, 8, 5);
            
            pop();
        }
        
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
        
        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }
        
        // Glyph interaction
        document.querySelectorAll('.glyph').forEach(glyph => {
            glyph.addEventListener('click', () => {
                let char = glyph.dataset.char;
                glyph.style.transform = 'scale(1.5) rotate(360deg)';
                setTimeout(() => {
                    glyph.style.transform = '';
                }, 500);
            });
        });
    </script>
</body>
</html>
